<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-5">
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card surface-card h-100">
                <div class="card-body p-4">
                    <div class="text-secondary small text-uppercase">Orders</div>
                    <div class="display-6 fw-bold" th:text="${totalOrders}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card surface-card h-100">
                <div class="card-body p-4">
                    <div class="text-secondary small text-uppercase">Revenue</div>
                    <div class="display-6 fw-bold" th:text="'$' + ${totalRevenue}">$0.00</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card surface-card">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 mb-0">Recent orders</h1>
                <span class="text-secondary" th:text="${#lists.size(branches)} + ' branches'">3 branches</span>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Branch</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Placed</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(recentOrders)}">
                        <td class="text-secondary" colspan="5">No orders yet. Seeded stock is ready for the first order.</td>
                    </tr>
                    <tr th:each="order : ${recentOrders}">
                        <td th:text="${order.customerName}">Walk-in Customer</td>
                        <td th:text="${order.branch.name}">CBD Branch</td>
                        <td th:text="${order.status}">CONFIRMED</td>
                        <td th:text="'$' + ${order.totalAmount}">$2.50</td>
                        <td th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2026-04-09 20:00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
