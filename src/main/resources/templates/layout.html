<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title th:text="${title} + ' | DrinksCo'">DrinksCo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #1E3A8A;
            --brand-secondary: #14B8A6;
            --brand-accent: #F97316;
            --brand-bg: #F9FAFB;
            --brand-text: #111827;
            --brand-muted: #526075;
            --brand-surface: rgba(255, 255, 255, 0.88);
            --brand-border: rgba(30, 58, 138, 0.12);
            --brand-shadow: 0 24px 70px rgba(17, 24, 39, 0.10);
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(20, 184, 166, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(249, 115, 22, 0.14), transparent 28%),
                linear-gradient(180deg, #eef4ff 0%, var(--brand-bg) 34%, #f4fffd 100%);
            min-height: 100vh;
            color: var(--brand-text);
            font-family: "Manrope", sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: "Space Grotesk", sans-serif;
        }
        .navbar-brand {
            letter-spacing: 0.08em;
            font-weight: 700;
            color: var(--brand-primary);
        }
        .navbar {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--brand-border);
        }
        .navbar .nav-link {
            color: var(--brand-muted);
            font-weight: 600;
        }
        .navbar .nav-link:hover,
        .navbar .nav-link:focus {
            color: var(--brand-primary);
        }
        .hero-card, .surface-card {
            border: 0;
            border-radius: 1.5rem;
            background: var(--brand-surface);
            box-shadow: var(--brand-shadow);
            backdrop-filter: blur(14px);
        }
        .surface-card {
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .section-label,
        .text-secondary,
        .form-text,
        .table thead th {
            color: var(--brand-muted) !important;
        }
        .badge.text-bg-dark,
        .badge.text-bg-success {
            background: rgba(30, 58, 138, 0.12) !important;
            color: var(--brand-primary) !important;
            border: 1px solid rgba(30, 58, 138, 0.16);
        }
        .bg-light {
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.05), rgba(20, 184, 166, 0.05)) !important;
        }
        .btn-dark,
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-primary), #2759c6) !important;
            border-color: transparent !important;
            border-radius: 999px;
            font-weight: 700;
            box-shadow: 0 16px 35px rgba(30, 58, 138, 0.24);
        }
        .btn-dark:hover,
        .btn-dark:focus,
        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #17306f, var(--brand-primary)) !important;
        }
        .btn-outline-accent {
            border: 1px solid rgba(249, 115, 22, 0.28);
            color: var(--brand-accent);
            background: rgba(249, 115, 22, 0.08);
            border-radius: 999px;
            font-weight: 700;
        }
        .btn-outline-accent:hover,
        .btn-outline-accent:focus {
            background: var(--brand-accent);
            color: #fff;
        }
        .form-control,
        .form-select {
            border-radius: 1rem;
            border: 1px solid rgba(30, 58, 138, 0.16);
            padding: 0.85rem 1rem;
            background-color: rgba(255, 255, 255, 0.92);
        }
        .form-control:focus,
        .form-select:focus {
            border-color: rgba(20, 184, 166, 0.85);
            box-shadow: 0 0 0 0.2rem rgba(20, 184, 166, 0.18);
        }
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--brand-text);
            --bs-table-border-color: rgba(30, 58, 138, 0.08);
        }
        .table thead th {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .alert-danger {
            border: 0;
            border-radius: 1rem;
            background: rgba(249, 115, 22, 0.12);
            color: #9a3412;
        }
        .metric-chip {
            border-radius: 1.15rem;
            padding: 1rem 1.1rem;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(30, 58, 138, 0.08);
        }
        .accent-dot {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 50%;
            display: inline-block;
            background: var(--brand-accent);
            box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.12);
        }
        .page-shell {
            position: relative;
        }
        .page-shell::before {
            content: "";
            position: fixed;
            inset: auto auto 8% 6%;
            width: 16rem;
            height: 16rem;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.14), transparent 68%);
            pointer-events: none;
            z-index: -1;
        }
        .page-shell::after {
            content: "";
            position: fixed;
            inset: 12% 5% auto auto;
            width: 18rem;
            height: 18rem;
            background: radial-gradient(circle, rgba(30, 58, 138, 0.14), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        @media (max-width: 991.98px) {
            .navbar .navbar-nav {
                padding-top: 0.75rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand text-uppercase" th:href="@{/order}">DrinksCo</a>
        <div class="navbar-nav ms-auto gap-2">
            <a class="nav-link" th:href="@{/order}">Order</a>
            <a class="nav-link" th:href="@{/admin}">Dashboard</a>
            <a class="nav-link" th:href="@{/admin/stock}">Stock</a>
            <a class="nav-link" th:href="@{/admin/reports}">Reports</a>
        </div>
    </div>
</nav>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
