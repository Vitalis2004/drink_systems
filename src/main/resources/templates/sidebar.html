<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | DrinksCo'">DrinksCo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f4efe6 0%, #ffffff 55%, #e2f1ee 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            letter-spacing: 0.08em;
            font-weight: 700;
        }
        .hero-card, .surface-card {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 1rem 2.5rem rgba(31, 41, 55, 0.08);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand text-uppercase" th:href="@{/}">DrinksCo</a>
        <div class="navbar-nav ms-auto gap-2">
            <a class="nav-link" th:href="@{/}">Order</a>
            <a class="nav-link" th:href="@{/admin}">Dashboard</a>
            <a class="nav-link" th:href="@{/admin/stock}">Stock</a>
            <a class="nav-link" th:href="@{/admin/reports}">Reports</a>
        </div>
    </div>
</nav>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
